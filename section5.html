<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message From My Heart - Birthday Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Cormorant+Garamond:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Great+Vibes&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, #c8a882 0%, #d9cdc1 25%, #c9a574 50%, #d4b896 75%, #c1955f 100%);
            color: #5c4033;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Aged paper texture background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /><feDisplacementMap in="SourceGraphic" scale="50" /></filter></defs><rect width="400" height="400" fill="%23c8a882"/><circle cx="50" cy="80" r="30" fill="rgba(139,69,19,0.05)" filter="url(%23noise)"/><circle cx="320" cy="150" r="50" fill="rgba(160,82,45,0.04)"/><circle cx="100" cy="300" r="40" fill="rgba(101,50,30,0.06)"/><circle cx="350" cy="280" r="35" fill="rgba(139,69,19,0.05)"/></svg>'),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.02) 2px, rgba(0,0,0,.02) 4px),
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,.01) 1px, rgba(0,0,0,.01) 3px);
            z-index: 0;
            pointer-events: none;
            background-attachment: fixed;
        }

        /* Brown ink stains */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(ellipse 300px 200px at -10% 20%, rgba(120,60,30, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 250px 180px at 110% 70%, rgba(100,50,25, 0.07) 0%, transparent 65%),
                radial-gradient(ellipse 200px 150px at 50% -5%, rgba(90,40,20, 0.05) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
            background-attachment: fixed;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* Vintage Card */
        .card {
            background: linear-gradient(135deg, #f5ede2 0%, #f0e8dd 50%, #ede5da 100%);
            border-radius: 0px;
            padding: 80px 70px;
            max-width: 850px;
            width: 100%;
            text-align: center;
            box-shadow: 
                0 40px 100px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                inset 0 -3px 8px rgba(0, 0, 0, 0.08);
            animation: slideUp 0.8s ease-out;
            border: 6px double #8b6f47;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(0deg, 
                    transparent, 
                    transparent 1px, 
                    rgba(0,0,0,0.008) 1px, 
                    rgba(0,0,0,0.008) 2px),
                radial-gradient(circle at 20% 50%, rgba(0,0,0,0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ornamental divider */
        .ornament {
            font-size: 1.8rem;
            color: #8b6f47;
            margin: 1.5rem 0;
            letter-spacing: 1rem;
            font-weight: 300;
        }

        /* Title */
        h1.big-title {
            font-family: 'Tangerine', cursive;
            font-size: clamp(3.5rem, 10vw, 7rem);
            margin-bottom: 0.3rem;
            color: #3d2817;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Intro text */
        .intro-text {
            font-size: 1.1rem;
            line-height: 2;
            color: #4a3728;
            margin: 30px 0 50px 0;
            font-style: italic;
            font-family: 'Crimson Text', serif;
            letter-spacing: 0.5px;
        }

        /* Audio player container */
        .media-container {
            margin: 50px 0;
            animation: fadeInScale 0.8s ease-out 0.3s both;
        }

        .audio-player {
            background: linear-gradient(135deg, #6b4423 0%, #5c3d1f 100%);
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .audio-player::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .player-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .player-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a574 0%, #c9a574 100%);
            border: 3px solid #f5ede2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            color: #3d2817;
            font-weight: bold;
        }

        .player-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .player-btn:active {
            transform: scale(0.95);
        }

        .player-status {
            color: #f5ede2;
            font-size: 0.95rem;
            margin-top: 15px;
            font-family: 'Great Vibes', cursive;
            letter-spacing: 1px;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Buttons */
        .btn-container {
            display: flex;
            gap: 1.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 50px;
        }

        .btn {
            padding: 14px 40px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 3px solid #8b6f47;
            border-radius: 0px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, #f5ede2 0%, #ede5da 100%);
            color: #3d2817;
            box-shadow: 
                0 6px 15px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: inline-block;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #8b6f47;
            transition: left 0.4s ease;
            z-index: -1;
        }

        .btn:hover {
            color: #f5ede2;
            transform: translateY(-3px);
            box-shadow: 
                0 10px 25px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn:hover::before {
            left: 0;
        }

        /* Navigation */
        .nav-links {
            position: fixed;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .nav-link {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #8b6f47;
            color: #3d2817;
            text-decoration: none;
            font-weight: 600;
            border-radius: 2px;
            transition: all 0.3s ease;
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-link:hover {
            background: #8b6f47;
            color: #f5ede2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .card {
                padding: 50px 30px;
            }

            h1.big-title {
                font-size: 3rem;
            }

            .intro-text {
                font-size: 1rem;
            }

            .audio-player {
                padding: 20px;
                max-width: 300px;
            }

            .player-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .btn {
                padding: 12px 30px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div class="nav-links">
        <a href="section4.html" class="nav-link">← Previous</a>
        <a href="birthday-wishes.html" class="nav-link">Home</a>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="card">
            <div class="card-content">
                <!-- Ornamental divider -->
                <div class="ornament">❦ ✦ ❦</div>

                <!-- Title -->
                <h1 class="big-title">A Message From My Heart</h1>

                <!-- Ornamental divider -->
                <div class="ornament">❦ ✦ ❦</div>

                <!-- Intro text -->
                <div class="intro-text">
                    Sometimes, written words<br>
                    are not enough to express feelings.<br><br>

                    So this message<br>
                    is meant to be heard,<br>
                    not just read.
                </div>

                <!-- Audio Player -->
                <div class="media-container">
                    <div class="audio-player" id="audioPlayer">
                        <div class="player-controls" style="display: flex; gap: 15px; align-items: center; justify-content: center;">
                            <button class="player-btn" id="playBtn" title="Play" onclick="toggleAudio()" style="cursor: pointer;">▶</button>
                            <button class="player-btn" id="pauseBtn" title="Pause" onclick="toggleAudio()" style="display:none; cursor: pointer;">⏸</button>
                            <div class="player-status" id="playerStatus" style="flex: 1; text-align: center;">Loading audio...</div>\n                        </div>\n                    </div>\n                </div>

                <!-- Button -->
                <div class="btn-container">
                    <a href="section7.html" class="btn btn-primary">Celebrate This Moment</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio element -->
    <audio id="audioMessage" style="display: none;" crossorigin="anonymous" preload="auto" onerror="handleAudioError()">
        <source src="voice.mp4" type="audio/mpeg">
        <source src="./voice.mp4" type="audio/mpeg">
        <source src="voice.mp4" type="audio/mp4">
        <source src="./voice.mp4" type="audio/mp4">
        Your browser does not support the audio element.
    </audio>

    <script>
        let isPlaying = false;
        const audio = document.getElementById('audioMessage');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const playerStatus = document.getElementById('playerStatus');
        let audioReady = false;

        // Initialize audio element
        audio.addEventListener('canplay', function() {
            audioReady = true;
            playerStatus.textContent = '✓ Ready to listen';
            playerStatus.style.color = '#d4a574';
            playBtn.disabled = false;
            playBtn.style.opacity = '1';
        });

        audio.addEventListener('loadstart', function() {
            if (!audioReady) playerStatus.textContent = '⏳ Loading audio...';
        });

        function toggleAudio() {
            if (!audioReady) {
                playerStatus.textContent = '⚠️ Audio still loading...';
                return;
            }
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playBtn.style.display = 'flex';
                pauseBtn.style.display = 'none';
                playerStatus.textContent = '⏸ Paused';
            } else {
                audio.play().catch(e => {
                    playerStatus.textContent = '⚠️ Cannot play audio';
                });
                isPlaying = true;
                playBtn.style.display = 'none';
                pauseBtn.style.display = 'flex';
                playerStatus.textContent = '▶ Now playing...';
            }
        }

        audio.addEventListener('ended', function() {
            isPlaying = false;
            playBtn.style.display = 'flex';
            pauseBtn.style.display = 'none';
            playerStatus.textContent = '✓ Message played ❤';
        });

        function handleAudioError() {
            audioReady = false;
            playerStatus.textContent = '❌ Audio file not available';
            playerStatus.style.color = '#ff6b6b';
            playBtn.disabled = true;
            playBtn.style.opacity = '0.5';
            playBtn.style.cursor = 'not-allowed';
        }

        // Check file availability on load
        window.addEventListener('load', function() {
            if (!audioReady) {
                setTimeout(function() {
                    if (!audioReady) {
                        handleAudioError();
                    }
                }, 3000);
            }
        });
    </script>
</body>
</html>
