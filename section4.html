<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missing You - Birthday Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Cormorant+Garamond:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Great+Vibes&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, #c8a882 0%, #d9cdc1 25%, #c9a574 50%, #d4b896 75%, #c1955f 100%);
            color: #5c4033;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Aged paper texture background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /><feDisplacementMap in="SourceGraphic" scale="50" /></filter></defs><rect width="400" height="400" fill="%23c8a882"/><circle cx="50" cy="80" r="30" fill="rgba(139,69,19,0.05)" filter="url(%23noise)"/><circle cx="320" cy="150" r="50" fill="rgba(160,82,45,0.04)"/><circle cx="100" cy="300" r="40" fill="rgba(101,50,30,0.06)"/><circle cx="350" cy="280" r="35" fill="rgba(139,69,19,0.05)"/></svg>'),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.02) 2px, rgba(0,0,0,.02) 4px),
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,.01) 1px, rgba(0,0,0,.01) 3px);
            z-index: 0;
            pointer-events: none;
            background-attachment: fixed;
        }

        /* Brown ink stains for vintage effect */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(ellipse 300px 200px at -10% 20%, rgba(120,60,30, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 250px 180px at 110% 70%, rgba(100,50,25, 0.07) 0%, transparent 65%),
                radial-gradient(ellipse 200px 150px at 50% -5%, rgba(90,40,20, 0.05) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
            background-attachment: fixed;
        }

        /* Fixed Background Container */
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        /* Vintage stains */
        .stain {
            position: fixed;
            z-index: 1;
            background: radial-gradient(ellipse, rgba(101,50,30,0.1) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* Vintage Letter Card */
        .card {
            background: linear-gradient(135deg, #e8dcc4 0%, #e0d4bc 25%, #ded2b9 50%, #e8dcc4 75%, #e6dab8 100%);
            border-radius: 2px;
            padding: 60px 60px;
            max-width: 900px;
            width: 100%;
            text-align: center;
            box-shadow: 
                0 40px 100px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.4),
                inset 0 -5px 15px rgba(0, 0, 0, 0.08),
                inset 0 0 50px rgba(0, 0, 0, 0.05);
            animation: slideUp 0.8s ease-out;
            border: 8px solid #8b7355;
            position: relative;
            overflow: hidden;
        }

        /* Aged book page with ruled lines */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent 39px,
                    rgba(139, 111, 71, 0.12) 39px,
                    rgba(139, 111, 71, 0.12) 40px),
                repeating-linear-gradient(90deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.01) 2px,
                    rgba(0, 0, 0, 0.01) 4px),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" /><feDisplacementMap in="SourceGraphic" scale="40" /></filter></defs><rect fill="%23e8dcc4" width="200" height="200"/><circle cx="40" cy="40" r="20" fill="rgba(139,69,19,0.03)" filter="url(%23noise)"/><circle cx="160" cy="120" r="30" fill="rgba(120,60,30,0.04)" filter="url(%23noise)"/></svg>');
            pointer-events: none;
            z-index: 1;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(ellipse 400px 300px at 10% 20%, rgba(120,60,30, 0.06) 0%, transparent 65%),
                radial-gradient(ellipse 350px 280px at 90% 80%, rgba(100,50,25, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse 300px 200px at 50% 5%, rgba(90,40,20, 0.04) 0%, transparent 55%);
            z-index: 1;
            pointer-events: none;
        }

        .card-content {
            position: relative;
            z-index: 2;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ornamental divider */
        .ornament {
            font-size: 1.8rem;
            color: #8b6f47;
            margin: 1.5rem 0;
            letter-spacing: 1rem;
            font-weight: 300;
        }

        /* Title - Handwritten Style */
        h1.big-title {
            font-family: 'Tangerine', cursive;
            font-size: clamp(4rem, 12vw, 8rem);
            margin-bottom: 0.3rem;
            color: #3d2817;
            font-weight: 700;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.6);
            animation: fadeInDown 0.8s ease-out;
            line-height: 1.2;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-size: 2.5rem;
            color: #6b4423;
            margin-bottom: 1.5rem;
            font-family: 'Great Vibes', cursive;
            font-style: italic;
            font-weight: 400;
            letter-spacing: 1px;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Message Text */
        .message-text {
            font-size: 1.15rem;
            line-height: 2.2;
            color: #4a3728;
            margin: 35px 0;
            font-style: italic;
            font-family: 'Crimson Text', serif;
            letter-spacing: 0.5px;
            text-align: justify;
            min-height: 300px;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #3d2817;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .typing-complete .typing-cursor {
            display: none;
        }

        /* Buttons */
        .btn-container {
            display: flex;
            gap: 1.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 45px;
        }

        .btn {
            padding: 14px 40px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 3px solid #8b6f47;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, #f5ede2 0%, #ede5da 100%);
            color: #3d2817;
            box-shadow: 
                0 6px 15px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: inline-block;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #8b6f47;
            transition: left 0.4s ease;
            z-index: -1;
        }

        .btn:hover {
            color: #f5ede2;
            transform: translateY(-3px);
            box-shadow: 
                0 10px 25px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn:hover::before {
            left: 0;
        }

        .btn.hidden {
            display: none;
        }

        .btn.visible {
            display: inline-block;
            animation: slideInUp 0.6s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Navigation links */
        .nav-links {
            position: fixed;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .nav-link {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #8b6f47;
            color: #3d2817;
            text-decoration: none;
            font-weight: 600;
            border-radius: 2px;
            transition: all 0.3s ease;
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-link:hover {
            background: #8b6f47;
            color: #f5ede2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .card {
                padding: 40px 30px;
                border-width: 6px;
            }

            h1.big-title {
                font-size: 3.5rem;
            }

            .subtitle {
                font-size: 1.8rem;
            }

            .message-text {
                font-size: 1rem;
            }

            .btn {
                padding: 12px 30px;
                font-size: 0.8rem;
            }

            .btn-container {
                flex-direction: column;
                gap: 1.2rem;
            }

            .ornament {
                letter-spacing: 0.5rem;
            }

            .nav-link {
                padding: 6px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div class="nav-links">
        <a href="section3.html" class="nav-link">← Previous</a>
        <a href="index.html" class="nav-link">Home</a>
    </div>

    <!-- Floating Background with Stains -->
    <div class="floating-bg" id="bgHearts">
        <div class="stain" style="width: 150px; height: 120px; top: 10%; left: 5%; animation: drift 8s ease-in-out infinite;"></div>
        <div class="stain" style="width: 200px; height: 150px; top: 60%; right: 3%; animation: drift 10s ease-in-out infinite reverse;"></div>
        <div class="stain" style="width: 100px; height: 80px; bottom: 15%; left: 10%; animation: drift 12s ease-in-out infinite;"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="card">
            <div class="card-content">
            
                <!-- Section Title -->
                <h1 class="big-title">Missing You</h1>
                <!-- Typing Text -->
                <div class="message-text" id="typingText"></div>
                <span class="typing-cursor" id="cursor"></span>

                <!-- Action Buttons -->
                <div class="btn-container">
                    <a href="section7.html" class="btn btn-primary hidden" id="nextPageBtn">Celebrate This Moment</a>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Add drift animation keyframe if not already defined
        if (!document.querySelector('style[data-drift]')) {
            const style = document.createElement('style');
            style.setAttribute('data-drift', 'true');
            style.textContent = `
                @keyframes drift {
                    0%, 100% { transform: translateY(0px) rotate(0deg); }
                    25% { transform: translateY(-20px) rotate(2deg); }
                    50% { transform: translateY(-40px) rotate(-2deg); }
                    75% { transform: translateY(-20px) rotate(1deg); }
                }
            `;
            document.head.appendChild(style);
        }

        // Typing Animation for Section 4
        const typingMessage = `Sometimes…

Distance makes moments feel longer,
and silence feels heavier than words.

There were days when I missed your smile,
and moments when I wished you were right there.

Not because something was missing,
but because your presence
always made everything feel complete.

Even when time moved forward,
some memories stayed still in my heart.

And today,
I just want you to know…

You were never far from my thoughts.`;

        let currentIndex = 0;
        const typingSpeed = 50; // milliseconds per character - slightly slower for emotional feel

        function typeWriter() {
            const typingContainer = document.getElementById('typingText');
            const cursor = document.getElementById('cursor');
            const button = document.getElementById('nextPageBtn');

            if (currentIndex < typingMessage.length) {
                const char = typingMessage[currentIndex];
                typingContainer.textContent += char;
                currentIndex++;
                setTimeout(typeWriter, typingSpeed);
            } else {
                // Typing complete
                if (cursor) cursor.style.display = 'none';
                if (button) {
                    button.classList.remove('hidden');
                    button.classList.add('visible');
                }
            }
        }

        // Start typing animation automatically on page load
        window.addEventListener('load', () => {
            typeWriter();
        });
    </script>
</body>
</html>
