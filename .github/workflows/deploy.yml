name: Deploy Birthday Site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Check file sizes
      run: |
        echo "Checking HTML files..."
        wc -l *.html
        echo "Checking media files..."
        ls -lah *.mp4 *.png 2>/dev/null || true

    - name: Validate HTML
      run: |
        for file in *.html; do
          if [ -f "$file" ]; then
            echo "Checking $file..."
            grep -q "<!DOCTYPE" "$file" && echo "✓ $file is valid HTML" || echo "✗ $file might have issues"
          fi
        done

    - name: Setup Pages
      uses: actions/configure-pages@v3

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
