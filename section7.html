<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Harshi - Birthday Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Cormorant+Garamond:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Great+Vibes&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, #d4a574 0%, #e8dcc8 25%, #c9a574 50%, #e0d4bc 75%, #d9c8b8 100%);
            color: #5c4033;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Aged paper texture with golden overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /><feDisplacementMap in="SourceGraphic" scale="50" /></filter></defs><rect width="400" height="400" fill="%23d4a574"/><circle cx="50" cy="80" r="30" fill="rgba(212, 165, 116, 0.08)" filter="url(%23noise)"/><circle cx="320" cy="150" r="50" fill="rgba(201, 165, 125, 0.06)"/><circle cx="100" cy="300" r="40" fill="rgba(180, 140, 100, 0.07)"/><circle cx="350" cy="280" r="35" fill="rgba(190, 150, 110, 0.06)"/></svg>'),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.01) 2px, rgba(0,0,0,.01) 4px),
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,.005) 1px, rgba(0,0,0,.005) 3px);
            z-index: 0;
            pointer-events: none;
            background-attachment: fixed;
        }

        /* Warm vintage stains */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(ellipse 300px 200px at -10% 20%, rgba(180, 140, 100, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 250px 180px at 110% 70%, rgba(160, 120, 80, 0.05) 0%, transparent 65%),
                radial-gradient(ellipse 200px 150px at 50% -5%, rgba(200, 160, 120, 0.04) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
            background-attachment: fixed;
        }

        /* Floating elements container */
        .celebration-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* Celebration Card - Brighter and more celebratory */
        .card {
            background: linear-gradient(135deg, #fff8f0 0%, #ffe8d6 25%, #fff0e0 50%, #ffe8d6 75%, #fff0e0 100%);
            border-radius: 0px;
            padding: 80px 70px;
            max-width: 900px;
            width: 100%;
            text-align: center;
            box-shadow: 
                0 50px 120px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.6),
                inset 0 -3px 8px rgba(212, 165, 116, 0.1);
            animation: slideUp 0.8s ease-out;
            border: 8px double #d4a574;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(0deg, 
                    transparent, 
                    transparent 1px, 
                    rgba(212, 165, 116, 0.03) 1px, 
                    rgba(212, 165, 116, 0.03) 2px);
            pointer-events: none;
            z-index: 1;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 80% 20%, rgba(255, 215, 0, 0.05) 0%, transparent 40%);
            z-index: 1;
            pointer-events: none;
        }

        .card-content {
            position: relative;
            z-index: 2;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ornamental divider */
        .ornament {
            font-size: 2rem;
            color: #d4a574;
            margin: 1.5rem 0;
            letter-spacing: 1.2rem;
            font-weight: 300;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Title */
        h1.big-title {
            font-family: 'Tangerine', cursive;
            font-size: clamp(4rem, 12vw, 8.5rem);
            margin-bottom: 0.3rem;
            color: #c9a574;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 
                2px 2px 4px rgba(255, 255, 255, 0.6),
                3px 3px 8px rgba(212, 165, 116, 0.3);
            animation: fadeInDown 0.8s ease-out;
            line-height: 1.1;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Subtitle */
        .subtitle {
            font-size: 1.8rem;
            color: #d4a574;
            margin-bottom: 1.5rem;
            font-family: 'Great Vibes', cursive;
            font-style: italic;
            font-weight: 400;
            letter-spacing: 1px;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Main Message */
        .celebration-message {
            font-size: 1.2rem;
            line-height: 2.2;
            color: #5c4033;
            margin: 40px 0;
            font-style: italic;
            font-family: 'Crimson Text', serif;
            letter-spacing: 0.5px;
            text-align: center;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        /* Highlight text */
        .highlight-text {
            font-size: 1.3rem;
            color: #d4a574;
            margin: 35px 0;
            font-family: 'Great Vibes', cursive;
            font-weight: 700;
            letter-spacing: 2px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                opacity: 1;
                transform: scale(1);
            }
            50% { 
                opacity: 0.8;
                transform: scale(1.02);
            }
        }

        /* Celebration elements */
        .celebration-elements {
            margin: 40px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            min-height: 80px;
        }

        .celebration-item {
            font-size: 3rem;
            animation: float-up 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .celebration-item:nth-child(1) { animation-delay: 0s; }
        .celebration-item:nth-child(2) { animation-delay: 0.3s; }
        .celebration-item:nth-child(3) { animation-delay: 0.6s; }

        @keyframes float-up {
            0%, 100% { 
                transform: translateY(0) rotate(0deg);
            }
            50% { 
                transform: translateY(-20px) rotate(5deg);
            }
        }

        /* Sparkles */
        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkle 1.5s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* Buttons */
        .btn-container {
            display: flex;
            gap: 1.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 50px;
        }

        .btn {
            padding: 14px 45px;
            font-size: 0.95rem;
            font-weight: 600;
            border: 3px solid #d4a574;
            border-radius: 0px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, #fff0e0 0%, #ffe8d6 100%);
            color: #c9a574;
            box-shadow: 
                0 8px 20px rgba(212, 165, 116, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: inline-block;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #d4a574 0%, #c9a574 100%);
            transition: left 0.4s ease;
            z-index: -1;
        }

        .btn:hover {
            color: #fff0e0;
            transform: translateY(-3px);
            box-shadow: 
                0 12px 30px rgba(212, 165, 116, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .btn:hover::before {
            left: 0;
        }

        /* Navigation */
        .nav-links {
            position: fixed;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .nav-link {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #d4a574;
            color: #c9a574;
            text-decoration: none;
            font-weight: 600;
            border-radius: 2px;
            transition: all 0.3s ease;
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-link:hover {
            background: #d4a574;
            color: #fff0e0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 165, 116, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .card {
                padding: 50px 30px;
                border-width: 6px;
            }

            h1.big-title {
                font-size: 3.5rem;
            }

            .subtitle {
                font-size: 1.4rem;
            }

            .celebration-message {
                font-size: 1rem;
            }

            .highlight-text {
                font-size: 1.1rem;
            }

            .celebration-elements {
                gap: 20px;
                min-height: 60px;
            }

            .celebration-item {
                font-size: 2.5rem;
            }

            .btn {
                padding: 12px 30px;
                font-size: 0.8rem;
            }

            .nav-link {
                padding: 6px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div class="nav-links">
        <a href="section5.html" class="nav-link">← Previous</a>
        <a href="birthday-wishes.html" class="nav-link">Home</a>
    </div>

    <!-- Celebration Background -->
    <div class="celebration-bg" id="celebrationBg">
        <!-- Sparkles will be added by JavaScript -->
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="card">
            <div class="card-content">
                <!-- Ornamental top -->
                <div class="ornament">❦ ✧ ❦</div>

                <!-- Title with emoji -->
                <h1 class="big-title">Happy Birthday<br>Harshi 🎂</h1>

                <!-- Ornamental divider -->
                <div class="ornament">✨ ⭐ ✨</div>

                <!-- Main Celebration Message -->
                <div class="celebration-message">
                    Today is not just another day,<br>
                    it is a celebration<br>
                    of the wonderful person you are.<br><br>

                    May your life be filled<br>
                    with smiles that last longer,<br>
                    moments that feel brighter,<br>
                    and memories that stay forever.
                </div>

                <!-- Highlight Text -->
                <div class="highlight-text">This moment is meant just for you.</div>

                <!-- Celebration Elements -->
                <div class="celebration-elements">
                    <div class="celebration-item">🎈</div>
                    <div class="celebration-item">✨</div>
                    <div class="celebration-item">🎉</div>
                </div>

                <!-- Ornamental divider -->
                <div class="ornament">❦ ✧ ❦</div>

            </div>
        </div>
    </div>

    <script>
        // Create floating sparkles
        function createSparkle() {
            const celebrationBg = document.getElementById('celebrationBg');
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            celebrationBg.appendChild(sparkle);

            // Random animation duration
            const duration = Math.random() * 2 + 1.5;
            sparkle.style.animationDuration = duration + 's';

            // Remove after animation
            setTimeout(() => sparkle.remove(), duration * 1000);
        }

        // Create sparkles periodically
        setInterval(createSparkle, 300);

        // Initial sparkles
        for (let i = 0; i < 10; i++) {
            setTimeout(createSparkle, i * 100);
        }

        // Confetti on page load
        function createConfetti() {
            const colors = ['#ffd700', '#ff69b4', '#ff6b6b', '#4ecdc4', '#d4a574', '#c9a574'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = Math.random() * 8 + 4 + 'px';
                confetti.style.height = confetti.style.width;
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '-10px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.pointerEvents = 'none';
                confetti.style.zIndex = 5;
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.boxShadow = '0 2px 4px rgba(0,0,0,0.2)';
                document.body.appendChild(confetti);

                const duration = Math.random() * 4 + 2.5;
                const xMove = Math.random() * 400 - 200;
                
                confetti.animate([
                    { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${xMove}px, ${window.innerHeight + 10}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });

                setTimeout(() => confetti.remove(), duration * 1000);
            }
        }

        // Trigger confetti on load
        window.addEventListener('load', createConfetti);

        // Create more confetti every 5 seconds
        setInterval(createConfetti, 5000);
    </script>
</body>
</html>
